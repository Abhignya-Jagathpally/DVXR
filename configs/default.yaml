d: 64
d_f: 128
codebook_size: 512
commitment_beta: 0.25
gumbel: false
temperature: 1.0
n_fusion_layers: 4
n_heads: 8
dropout: 0.1
fusion_strategy: cross_modal
aggregation: confidence_weighted
window_seconds: 30.0
window_step: 30.0
mask_ratio: 0.3
epochs: 30
batch_size: 64
lr_encoder: 0.001
lr_fusion: 0.0005
weight_decay: 0.01
beta1: 0.9
beta2: 0.999
warmup_frac: 0.08
grad_clip: 1.0
use_ema: false
lambda_task: 1.0
lambda_vq: 1.0
lambda_recon: 0.5
lambda_align: 0.1
align_temperature: 0.1
uncertainty_weighting: false
use_real_weights: true
allow_download: true
weights_cache_dir: ~/.cache/dvxr_weights
seed: 7
modalities:
- eeg
- wearable_phys
- cgm
- ehr
- omics
- behavior

# Prospective glucose-excursion outcome definition (Gate 1). Versioned here so a label set is always
# traceable to the exact thresholds that produced it; mirrored by dvxr.targets.ExcursionThresholds.
# Not consumed by CACMFConfig (unknown keys are ignored) — it is the study-config source of truth.
outcome_definition:
  version: pilot-v1
  low_mg_dl: 70.0
  high_mg_dl: 180.0
  horizons_minutes: [30, 60]
  history_minutes: 240
  target_tolerance_minutes: 5.0
  min_history_samples: 1
